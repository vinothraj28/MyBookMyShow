trigger:
  branches:
    include:
      - main
      - feature/*

pr:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  node_version: '22.14.0'
  java_version: '21'

stages:
  - stage: Build_Backend
    displayName: "Build Spring Boot Backend"
    jobs:
      - job: BuildJava
        steps:
          # Use Java 21
          - task: JavaToolInstaller@0
            inputs:
              versionSpec: '21'
              jdkArchitectureOption: 'x64'
              jdkSourceOption: 'PreInstalled'

          # Build backend with Maven
          - task: Maven@4
            inputs:
              mavenPomFile: 'movie/movie/pom.xml'
              goals: 'clean package -DskipTests'
              publishJUnitResults: true
              testResultsFiles: '**/surefire-reports/TEST-*.xml'

          # Debug: check contents of target folder
          - script: |
              echo "Contents of target directory:"
              ls -l movie/movie/target || echo "No target directory found"
            displayName: "Verify backend build output"

          # Publish backend artifact (JAR/WAR)
          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: 'movie/movie/target/'
              ArtifactName: 'springboot-app'
              publishLocation: 'Container'
  
  - stage: Deploy_Backend
    displayName: "Deploy Spring Boot Backend to Azure Container Apps"
    dependsOn: Build_Backend
    jobs:
      - job: DeployJava
        steps:

          - task: DownloadPipelineArtifact@2
          inputs:
            artifact: 'springboot-app'
            path: 'movie/movie/target'
            
          # Login to Docker Hub
          - script: |
              echo "$(DOCKERHUB_PASSWORD)" | docker login -u "$(DOCKERHUB_USERNAME)" --password-stdin
            displayName: "Login to Docker Hub"

          # Build & push image
          - script: |
              docker build -t removino68/movie-backend:latest$BUILD_BUILDID movie/movie
              docker push removino68/movie-backend:latest$BUILD_BUILDID
            displayName: "Build and Push Docker Image"

          # Update Azure Container App with new image
          - task: AzureCLI@2
            inputs:
              azureSubscription: "AzureConnection"   # 👈 your service connection name
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az containerapp update \
                  --name vinothrajbackend \
                  --resource-group BackendDB \
                  --image removino68/movie-backend:latest$BUILD_BUILDID

  - stage: Build_Frontend
    displayName: "Build Angular Frontend"
    jobs:
      - job: BuildAngular
        steps:
          # Use Node.js 22.14.0
          - task: UseNode@1
            inputs:
              version: '$(node_version)'

          # Install dependencies, lint, and build Angular
          - script: |
              cd BookMyShow
              npm ci
              npm run lint
              npm run build -- --configuration production
            displayName: "Build Angular"

          # Publish frontend artifact (dist folder)
          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: 'BookMyShow/dist/book-my-show/browser'
              ArtifactName: 'angular-app'
              publishLocation: 'Container'

  - stage: Deploy_Frontend
    displayName: "Deploy Angular Frontend to SWA"
    dependsOn: Build_Frontend
    jobs:
      - job: DeployAngular
        steps:
          # Download the built Angular artifact
          - task: DownloadPipelineArtifact@2
            inputs:
              artifact: 'angular-app'
              path: 'angular-app'
          - script: |
              echo "Listing contents of downloaded artifact:"
              ls -R $(Pipeline.Workspace)/
            displayName: "Debug artifact folder structure"

          # Deploy using AzureStaticWebApp task
          - task: AzureStaticWebApp@0
            inputs:
              app_location: 'angular-app'  # folder containing index.html
              output_location: ''                               # Angular already built
              skip_app_build: true                              # skip building again
              azure_static_web_apps_api_token: $(SWA_DEPLOY_TOKEN)

